<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Adoção - ONG</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">
        <h2>Formulário de Interesse em Adoção</h2>
        <p>Preencha todos os campos com atenção. A adoção é um ato de responsabilidade.</p>
        
        <form id="formAdocao">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required minlength="3">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone (DDD + Número)</label>
                    <input type="tel" id="telefone" required minlength="8">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="cpf">CPF (apenas números)</label>
                    <input type="text" id="cpf" required maxlength="11">
                </div>
                <div class="form-group">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" required>
                </div>
            </div>

            <div class="form-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" required>
            </div>

            <div class="form-group">
                <label for="tipoMoradia">Tipo de Moradia</label>
                <select id="tipoMoradia" required>
                    <option value="">Selecione...</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>
            </div>

            <div id="sessaoCasa" class="hidden">
                <div class="form-group">
                    <label for="quintalSeguro">O quintal é totalmente seguro e telado?</label>
                    <select id="quintalSeguro">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div id="sessaoApto" class="hidden">
                <div class="form-group">
                    <label for="permiteAnimais">O condomínio permite animais?</label>
                    <select id="permiteAnimais">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="possuiQuintal">Possui quintal?</label>
                <select id="possuiQuintal" required>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="jaTevePet">Já teve pet antes?</label>
                    <select id="jaTevePet" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="horasSozinho">Horas que o pet ficará sozinho (por dia)</label>
                    <input type="number" id="horasSozinho" required min="0" max="24">
                </div>
            </div>

            <div class="form-group">
                <label for="condicaoFinanceira">Possui condições financeiras para manter vacinas e ração?</label>
                <select id="condicaoFinanceira" required>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div class="form-group">
                <label for="motivo">Motivo da Adoção</label>
                <textarea id="motivo" rows="3" required minlength="10"></textarea>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="termo" required>
                <label for="termo">Aceito o termo de responsabilidade e cuidado vitalício.</label>
            </div>

            <button type="submit" id="btnEnviar">Enviar Cadastro</button>
        </form>

        <div id="displayDados" class="hidden">
            <h3>Dados Recebidos:</h3>
            <pre id="jsonResult"></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
