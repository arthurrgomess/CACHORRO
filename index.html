<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Adoção - ONG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Interesse em Adoção</h2>
        <form id="formAdocao">
            <div class="campo">
                <label>Nome Completo:</label>
                <input type="text" id="nome" required minlength="3">
            </div>

            <div class="campo">
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>

            <div class="campo">
                <label>Telefone:</label>
                <input type="tel" id="telefone" required minlength="8">
            </div>

            <div class="campo">
                <label>CPF:</label>
                <input type="text" id="cpf" required placeholder="00000000000">
            </div>

            <div class="campo">
                <label>Idade:</label>
                <input type="number" id="idade" required>
            </div>

            <div class="campo">
                <label>Cidade:</label>
                <input type="text" id="cidade" required>
            </div>

            <div class="campo">
                <label>Tipo de Moradia:</label>
                <select id="tipoMoradia" required onchange="ajustarCampos()">
                    <option value="">Selecione...</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>
            </div>

            <div id="campoApto" class="hidden">
                <div class="campo">
                    <label>O condomínio permite animais?</label>
                    <select id="permiteAnimais">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div id="campoCasa" class="hidden">
                <div class="campo">
                    <label>O quintal é seguro/telado?</label>
                    <select id="quintalSeguro">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="campo">
                <label>Possui quintal?</label>
                <select id="possuiQuintal" required>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div class="campo">
                <label>Já teve pet antes?</label>
                <select id="jaTevePet" required>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div class="campo">
                <label>Quantas horas o animal ficará sozinho por dia?</label>
                <input type="number" id="horasSozinho" required>
            </div>

            <div class="campo">
                <label>Motivo da adoção:</label>
                <textarea id="motivo" required minlength="10"></textarea>
            </div>

            <div class="campo">
                <label>
                    <input type="checkbox" id="termo" required> Aceito o termo de responsabilidade
                </label>
            </div>

            <button type="submit">Enviar Formulário</button>
        </form>

        <div id="resultado" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
